services:
  - type: web
    name: cymonic-talent-engine
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: NVIDIA_MODEL
        value: "meta/llama-3.3-70b-instruct"
      - key: NVIDIA_FAST_MODEL
        value: "meta/llama-3.1-8b-instruct"
      - key: DATABASE_URL
        value: "sqlite:///./talent_engine.db"
      # The NVIDIA_API_KEY is not included here for security. 
      # You MUST add it manually in the Render Dashboard after deployment!
